spring.application.name=SpringSecurityBackendDemo

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mydb1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Arya@9951}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HikariCP - give DB time to be ready on Railway
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

app.jwt.secret=${JWT_SECRET:AgriConnectJwtSecretKeyForSpringSecurityBackendDemo2026MustBeLong}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.frontend.urls=${FRONTEND_URLS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

